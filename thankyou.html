<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Submitted | Stackvern</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #0f172a;
    }

    .box {
      width: min(90%, 650px);
      background: white;
      padding: 40px 30px;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 2rem;
    }

    p {
      color: #475569;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    a {
      display: inline-block;
      padding: 12px 22px;
      background: #0f172a;
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
    }

    a:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Your message is submitted</h1>
    <p>Thank you for contacting Stackvern team. We have received your message and will get back to you further soon.</p>
    <a href="./index.html">Go Back to Home</a>
  </div>
</body>
</html>
